name: sn_player
description: SnPlayer - 视频加密管理工具，AES-256-CTR 加密保护您的视频文件。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 加密核心
  pointycastle: ^3.7.3

  # 视频播放
  video_player: ^2.8.0

  # 文件选择
  file_picker: ^11.0.0

  # 权限管理
  permission_handler: ^11.0.0

  # 路径管理
  path_provider: ^2.1.0
  path: ^1.8.0

  # 状态管理
  provider: ^6.1.0

  # 缩略图
  video_thumbnail: ^0.5.3

  # 工具
  uuid: ^4.2.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
